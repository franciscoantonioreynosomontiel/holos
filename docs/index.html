<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Card - Iono's Voltorb</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/cards/base.css">
    <link rel="stylesheet" href="css/cards.css">
    <!-- Include all card style variations -->
    <link rel="stylesheet" href="css/cards/basic.css">
    <link rel="stylesheet" href="css/cards/v-regular.css">
    <link rel="stylesheet" href="css/cards/v-max.css">
    <link rel="stylesheet" href="css/cards/v-star.css">
    <link rel="stylesheet" href="css/cards/v-full-art.css">
    <link rel="stylesheet" href="css/cards/rainbow-holo.css">
    <link rel="stylesheet" href="css/cards/cosmos-holo.css">
    <link rel="stylesheet" href="css/cards/amazing-rare.css">
    <link rel="stylesheet" href="css/cards/radiant-holo.css">
    <link rel="stylesheet" href="css/cards/secret-rare.css">
    <link rel="stylesheet" href="css/cards/shiny-rare.css">
    <link rel="stylesheet" href="css/cards/shiny-v.css">
    <link rel="stylesheet" href="css/cards/shiny-vmax.css">
    <link rel="stylesheet" href="css/cards/regular-holo.css">
    <link rel="stylesheet" href="css/cards/reverse-holo.css">
    <link rel="stylesheet" href="css/cards/trainer-full-art.css">
    <link rel="stylesheet" href="css/cards/rainbow-alt.css">
    <link rel="stylesheet" href="css/cards/trainer-gallery-holo.css">
    <link rel="stylesheet" href="css/cards/trainer-gallery-secret-rare.css">
    <link rel="stylesheet" href="css/cards/trainer-gallery-v-max.css">
    <link rel="stylesheet" href="css/cards/trainer-gallery-v-regular.css">

    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #212121;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .showcase {
            width: 400px;
            max-width: 90vw;
        }
        .menu {
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .menu label {
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .menu select {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #222;
            color: white;
            cursor: pointer;
            outline: none;
            transition: border-color 0.3s;
        }
        .menu select:hover {
            border-color: #666;
        }
    </style>
</head>
<body>
    <div class="menu">
        <label for="rarity-select">Foil Type:</label>
        <select id="rarity-select">
            <option value="rare holo">Holo</option>
            <option value="rare holo cosmos" selected>Cosmos Holo</option>
            <option value="rare holo v">V Regular</option>
            <option value="rare holo vmax">V Max</option>
            <option value="rare holo vstar">V Star</option>
            <option value="radiant rare">Radiant Rare</option>
            <option value="amazing rare">Amazing Rare</option>
            <option value="rare secret">Secret Rare</option>
            <option value="rare shiny">Shiny Rare</option>
            <option value="rare shiny v">Shiny V</option>
            <option value="rare shiny vmax">Shiny Vmax</option>
            <option value="rare rainbow">Rainbow</option>
            <option value="rare rainbow alt">Rainbow Alt</option>
            <option value="rare holo reverse">Reverse Holo</option>
            <option value="rare ultra">Ultra Rare</option>
            <option value="trainer gallery rare holo">Trainer Gallery</option>
        </select>
    </div>

    <div class="showcase">
        <div id="pokemon-card" class="card lightning interactive"
             data-rarity="rare holo cosmos"
             data-subtypes="basic"
             data-supertype="pokémon"
             style="--pointer-x: 50%; --pointer-y: 50%; --card-opacity: 0; --rotate-x: 0deg; --rotate-y: 0deg; --card-scale: 1;">
            <div class="card__translater">
                <div class="card__rotator">
                    <img class="card__back" src="https://tcg.pokemon.com/assets/img/global/tcg-card-back-2x.jpg" alt="Card Back">
                    <div class="card__front">
                        <img src="https://tcgplayer-cdn.tcgplayer.com/product/648663_in_1000x1000.jpg" alt="Iono's Voltorb">
                        <div class="card__shine"></div>
                        <div class="card__glare"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/bennettfeely/ztext/js/ztext.min.js"></script>
    <script src="cartasPoke.js"></script>
</body>
</html>
